<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56">
  <!-- Orange rounded square icon -->
  <rect width="48" height="48" x="0" y="4" rx="6" fill="#E85D26"/>
  <!-- Bold white X in icon -->
  <text x="5" y="41" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="38" font-weight="900" fill="white" letter-spacing="-2">X</text>
  <!-- ESTIMATORX name — dark text, orange X -->
  <text x="60" y="30" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-size="20" font-weight="900" fill="#1A1A1A" letter-spacing="-0.5">ESTIMATOR<tspan fill="#E85D26">X</tspan></text>
  <!-- .PRO orange pill badge -->
  <rect x="60" y="36" width="36" height="14" rx="3" fill="#E85D26"/>
  <text x="63" y="47" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="white" letter-spacing="1">.PRO</text>
</svg>
