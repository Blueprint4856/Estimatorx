kind = "web"
previewPath = "/"
title = "EstimatorX.pro"
version = "1.0.0"
id = "artifacts/estimatorx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22254

[services.development]
run = "pnpm --filter @workspace/estimatorx run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/estimatorx", "run", "build" ]
publicDir = "artifacts/estimatorx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22254"
BASE_PATH = "/"
